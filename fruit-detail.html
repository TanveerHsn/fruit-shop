// =====================================================
// Helpers
// =====================================================
function formatPrice(p) {
    return '$' + p.toFixed(2);
}
function discountedPrice(price, disc) {
    return Math.round((price - price * disc / 100) * 100) / 100;
}

// =====================================================
// Switch main image
// =====================================================
function switchImage(clickedThumb, src) {
    document.getElementById('mainImage').src = src;
    document.querySelectorAll('.thumb-gallery img').forEach(t => t.classList.remove('active'));
    clickedThumb.classList.add('active');
}

// =====================================================
// Render page
// =====================================================
function renderDetail() {
    const params = new URLSearchParams(window.location.search);
    const id     = parseInt(params.get('id'));
    const fruit  = fruitsData[id];

    if (!fruit) {
        window.location.href = 'index.html';
        return;
    }

    // Page title
    document.title = fruit.name + ' – FreshFruits';

    // Breadcrumb
    document.getElementById('breadcrumbCategory').innerHTML =
        `<a href="index.html" class="text-success" onclick="sessionStorage.setItem('filterCat','${fruit.category}'); return true;">${fruit.category}</a>`;
    document.getElementById('breadcrumbName').textContent = fruit.name;

    const finalPrice  = discountedPrice(fruit.actual_price, fruit.discount);
    const hasDiscount = fruit.discount > 0;
    const images      = fruit.images;
    const placeholder = 'https://placehold.co/800x600/e8f5e9/2e7d32?text=' + encodeURIComponent(fruit.name);

    // Thumbnails HTML
    const thumbsHtml = images.length > 1
        ? `<div class="thumb-gallery">
            ${images.map((src, i) => `
                <img src="${src}"
                     alt="${fruit.name} photo ${i+1}"
                     class="${i === 0 ? 'active' : ''}"
                     onclick="switchImage(this, '${src}')"
                     onerror="this.style.display='none'">`
            ).join('')}
           </div>`
        : '';

    // All photos grid
    const allPhotosHtml = images.length > 1
        ? `<hr class="my-5">
           <h4 class="fw-bold mb-4"><i class="bi bi-images me-2 text-success"></i>All Photos</h4>
           <div class="row g-3">
               ${images.map((src, i) => `
                   <div class="col-6 col-md-4 col-lg-3">
                       <img src="${src}"
                            alt="${fruit.name} photo ${i+1}"
                            class="img-fluid rounded-3 shadow-sm w-100"
                            style="height:180px;object-fit:cover;cursor:pointer"
                            onclick="
                                document.getElementById('mainImage').src='${src}';
                                document.querySelectorAll('.thumb-gallery img').forEach((t,idx)=>t.classList.toggle('active',idx===${i}));
                                window.scrollTo({top:0,behavior:'smooth'})"
                            onerror="this.parentElement.style.display='none'">
                   </div>`
               ).join('')}
           </div>`
        : '';

    document.getElementById('detailContent').innerHTML = `
        <a href="index.html" class="btn btn-outline-success btn-sm mb-4">
            <i class="bi bi-arrow-left me-1"></i>Back to Shop
        </a>

        <div class="row g-5">

            <!-- Image gallery -->
            <div class="col-lg-6">
                <img id="mainImage"
                     src="${images[0]}"
                     class="detail-image-main mb-3"
                     alt="${fruit.name}"
                     onerror="this.src='${placeholder}'">
                ${thumbsHtml}
            </div>

            <!-- Details -->
            <div class="col-lg-6">
                <span class="category-pill mb-2 d-inline-block">${fruit.category}</span>
                <h1 class="fw-bold mb-3" style="font-size:2rem">${fruit.name}</h1>

                <!-- Pricing box -->
                <div class="detail-price-box mb-4">
                    ${hasDiscount ? `
                        <div class="d-flex align-items-center gap-3 mb-1">
                            <span class="detail-price-final">${formatPrice(finalPrice)}</span>
                            <span class="detail-discount-tag">
                                <i class="bi bi-tag-fill me-1"></i>${fruit.discount}% OFF
                            </span>
                        </div>
                        <div class="detail-price-actual">Original price: ${formatPrice(fruit.actual_price)}</div>
                        <div class="mt-2 small text-success fw-semibold">
                            You save: ${formatPrice(fruit.actual_price - finalPrice)}
                        </div>
                    ` : `
                        <div class="detail-price-final">${formatPrice(fruit.actual_price)}</div>
                    `}
                    <hr class="my-3">
                    ${fruit.in_stock
                        ? `<span class="stock-badge stock-badge-in"><i class="bi bi-check-circle-fill me-1"></i>In Stock</span>`
                        : `<span class="stock-badge stock-badge-out"><i class="bi bi-x-circle-fill me-1"></i>Out of Stock</span>`
                    }
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <h5 class="fw-semibold mb-2">
                        <i class="bi bi-info-circle text-success me-2"></i>About this fruit
                    </h5>
                    <p class="text-muted lh-lg">${fruit.description}</p>
                </div>

                <!-- Meta -->
                <ul class="list-unstyled small text-muted">
                    <li class="mb-1">
                        <i class="bi bi-grid-3x3-gap-fill me-2 text-success"></i>
                        <strong>Category:</strong> ${fruit.category}
                    </li>
                    <li class="mb-1">
                        <i class="bi bi-images me-2 text-success"></i>
                        <strong>Photos:</strong> ${images.length} image${images.length !== 1 ? 's' : ''}
                    </li>
                    <li>
                        <i class="bi bi-clock me-2 text-success"></i>
                        <strong>Added:</strong> ${fruit.added_date}
                    </li>
                </ul>
            </div>
        </div>

        ${allPhotosHtml}
    `;
}
