<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login – FreshFruits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

    <div style="width:100%;max-width:420px">
        <div class="text-center text-white mb-4">
            <i class="bi bi-basket2-fill" style="font-size:2.5rem"></i>
            <h3 class="fw-bold mt-2">FreshFruits Admin</h3>
            <p class="opacity-75 small">Sign in to manage your fruit shop</p>
        </div>

        <div class="card border-0 shadow-lg">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4">
                    <i class="bi bi-shield-lock-fill text-success me-2"></i>Admin Login
                </h5>

                <div id="errorAlert" class="alert alert-danger d-none py-2">
                    <i class="bi bi-exclamation-circle me-2"></i><span id="errorMsg"></span>
                </div>

                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="username" class="form-control"
                                   placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" class="form-control"
                                   placeholder="Enter password" required>
                            <button type="button" class="btn btn-outline-secondary"
                                    onclick="togglePass(this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" id="submitBtn"
                            class="btn btn-success w-100 fw-bold py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center mt-3">
            <a href="../index.html" class="text-white opacity-75 small">
                <i class="bi bi-arrow-left me-1"></i>Back to Shop
            </a>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Redirect if already logged in
fetch('api/auth.php?action=check')
    .then(r => r.json())
    .then(d => { if (d.loggedIn) window.location.href = 'dashboard.html'; })
    .catch(() => {});

document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';

    const fd = new FormData();
    fd.append('action',   'login');
    fd.append('username', document.getElementById('username').value.trim());
    fd.append('password', document.getElementById('password').value);

    try {
        const res  = await fetch('api/auth.php', { method: 'POST', body: fd });
        const data = await res.json();

        if (data.success) {
            window.location.href = 'dashboard.html';
        } else {
            showError(data.error || 'Login failed.');
            resetBtn();
        }
    } catch {
        showError('Connection error. Please try again.');
        resetBtn();
    }
});

function showError(msg) {
    const el = document.getElementById('errorAlert');
    document.getElementById('errorMsg').textContent = msg;
    el.classList.remove('d-none');
}
function resetBtn() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
}
function togglePass(btn) {
    const input = btn.previousElementSibling;
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';  icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password'; icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
