<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard – FreshFruits Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex" style="min-height:100vh">

    <!-- Sidebar -->
    <aside class="admin-sidebar d-flex flex-column py-4">
        <div class="text-center text-white mb-4 px-3">
            <i class="bi bi-basket2-fill" style="font-size:2rem"></i>
            <div class="fw-bold mt-1">FreshFruits</div>
            <div class="opacity-75 small">Admin Panel</div>
        </div>
        <nav class="nav flex-column">
            <a href="dashboard.html" class="nav-link active">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
            <a href="add-fruit.html" class="nav-link">
                <i class="bi bi-plus-circle me-2"></i>Add Fruit
            </a>
            <a href="../index.html" class="nav-link">
                <i class="bi bi-shop me-2"></i>View Shop
            </a>
        </nav>
        <div class="mt-auto px-3">
            <div class="text-white opacity-75 small mb-2 text-center">
                <i class="bi bi-person-circle me-1"></i><span id="adminName">…</span>
            </div>
            <button onclick="logout()" class="btn btn-outline-light btn-sm w-100">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </div>
    </aside>

    <!-- Main content -->
    <div class="admin-content d-flex flex-column w-100">

        <!-- Top bar -->
        <div class="admin-topbar d-flex align-items-center justify-content-between">
            <h5 class="mb-0 fw-bold">Dashboard</h5>
            <a href="add-fruit.html" class="btn btn-success btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Add New Fruit
            </a>
        </div>

        <div class="p-4 flex-grow-1">

            <!-- Flash message -->
            <div id="flashMsg" class="d-none alert alert-dismissible fade show">
                <span id="flashText"></span>
                <button type="button" class="btn-close" onclick="document.getElementById('flashMsg').classList.add('d-none')"></button>
            </div>

            <!-- Stats -->
            <div class="row g-3 mb-4" id="statsRow">
                <div class="col-6 col-md-3">
                    <div class="admin-card card text-center p-3">
                        <div class="fs-1 text-success fw-bold" id="statTotal">–</div>
                        <div class="small text-muted">Total Fruits</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="admin-card card text-center p-3">
                        <div class="fs-1 text-primary fw-bold" id="statInStock">–</div>
                        <div class="small text-muted">In Stock</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="admin-card card text-center p-3">
                        <div class="fs-1 text-danger fw-bold" id="statOutStock">–</div>
                        <div class="small text-muted">Out of Stock</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="admin-card card text-center p-3">
                        <div class="fs-1 text-warning fw-bold" id="statDiscount">–</div>
                        <div class="small text-muted">On Discount</div>
                    </div>
                </div>
            </div>

            <!-- Fruits table -->
            <div class="admin-card card">
                <div class="card-header bg-transparent fw-semibold border-0 pt-3">
                    <i class="bi bi-table me-2 text-success"></i>All Fruits
                </div>
                <div class="card-body p-0">
                    <div id="tableWrap" class="table-responsive">
                        <div class="text-center py-5 text-muted">
                            <div class="spinner-border text-success" role="status"></div>
                            <p class="mt-2">Loading fruits…</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title text-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i>Delete Fruit
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete <strong id="deleteName"></strong>?
                This will also remove all its images and cannot be undone.
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">
                    <i class="bi bi-trash me-1"></i>Delete
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let deleteModal, pendingDeleteId;

// ── Auth guard ────────────────────────────────────────────────
async function init() {
    const auth = await fetch('api/auth.php?action=check').then(r => r.json()).catch(() => ({}));
    if (!auth.loggedIn) { window.location.href = 'login.html'; return; }
    document.getElementById('adminName').textContent = auth.username;
    deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    loadFruits();
    checkFlash();
}

// ── Flash from sessionStorage ────────────────────────────────
function checkFlash() {
    const msg = sessionStorage.getItem('flash');
    if (msg) {
        const el = document.getElementById('flashMsg');
        el.classList.remove('d-none');
        el.classList.add('alert-success');
        document.getElementById('flashText').textContent = msg;
        sessionStorage.removeItem('flash');
    }
}

// ── Load fruits table ────────────────────────────────────────
async function loadFruits() {
    try {
        const data = await fetch('api/fruits.php?action=list').then(r => r.json());
        if (!data.success) throw new Error();

        // Stats
        document.getElementById('statTotal').textContent    = data.stats.total;
        document.getElementById('statInStock').textContent  = data.stats.in_stock;
        document.getElementById('statOutStock').textContent = data.stats.out_stock;
        document.getElementById('statDiscount').textContent = data.stats.discounted;

        // Table
        const wrap = document.getElementById('tableWrap');
        if (data.fruits.length === 0) {
            wrap.innerHTML = '<p class="text-center text-muted py-4">No fruits yet. <a href="add-fruit.html">Add the first one!</a></p>';
            return;
        }

        let rows = data.fruits.map(f => {
            const final = (f.actual_price - f.actual_price * f.discount_percentage / 100).toFixed(2);
            const img   = f.primary_image
                ? `<img src="../${f.primary_image}" width="48" height="48" style="object-fit:cover;border-radius:8px" alt="">`
                : `<div class="bg-light d-flex align-items-center justify-content-center rounded" style="width:48px;height:48px;color:#ccc"><i class="bi bi-image"></i></div>`;
            const disc  = f.discount_percentage > 0
                ? `<span class="badge bg-warning text-dark">${f.discount_percentage}%</span>`
                : '<span class="text-muted">—</span>';
            const stock = f.in_stock
                ? '<span class="badge bg-success">In Stock</span>'
                : '<span class="badge bg-danger">Out of Stock</span>';
            return `<tr>
                <td>${img}</td>
                <td class="fw-semibold">${esc(f.name)}</td>
                <td><span class="category-pill">${esc(f.category)}</span></td>
                <td>$${parseFloat(f.actual_price).toFixed(2)}</td>
                <td>${disc}</td>
                <td class="fw-bold text-success">$${final}</td>
                <td>${stock}</td>
                <td><span class="badge bg-secondary"><i class="bi bi-images me-1"></i>${f.image_count}/5</span></td>
                <td>
                    <a href="edit-fruit.html?id=${f.id}" class="btn btn-sm btn-outline-primary me-1" title="Edit"><i class="bi bi-pencil"></i></a>
                    <a href="../fruit-detail.html?id=${f.id}" target="_blank" class="btn btn-sm btn-outline-success me-1" title="View"><i class="bi bi-eye"></i></a>
                    <button class="btn btn-sm btn-outline-danger" title="Delete"
                            onclick="askDelete(${f.id},'${esc(f.name).replace(/'/g,"\\'")}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');

        wrap.innerHTML = `
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th width="60"></th>
                        <th>Name</th><th>Category</th><th>Price</th>
                        <th>Discount</th><th>Final</th><th>Stock</th>
                        <th>Images</th><th width="130">Actions</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    } catch {
        document.getElementById('tableWrap').innerHTML =
            '<p class="text-center text-danger py-4">Failed to load fruits.</p>';
    }
}

// ── Delete flow ───────────────────────────────────────────────
function askDelete(id, name) {
    pendingDeleteId = id;
    document.getElementById('deleteName').textContent = name;
    deleteModal.show();
}

document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmDeleteBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Deleting…';

    const fd = new FormData();
    fd.append('action', 'delete');
    fd.append('id', pendingDeleteId);

    const data = await fetch('api/fruits.php', { method: 'POST', body: fd }).then(r => r.json()).catch(() => ({}));
    deleteModal.hide();
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-trash me-1"></i>Delete';

    if (data.success) {
        sessionStorage.setItem('flash', `"${data.name}" deleted successfully.`);
        location.reload();
    } else {
        alert(data.error || 'Delete failed.');
    }
});

// ── Logout ────────────────────────────────────────────────────
async function logout() {
    await fetch('api/auth.php', { method: 'POST', body: new URLSearchParams({ action: 'logout' }) });
    window.location.href = 'login.html';
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
