<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fresh Fruit Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background:var(--primary)">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-basket2-fill me-2"></i>Fresh<span>Fruits</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <div class="d-flex ms-auto me-3 my-2 my-lg-0">
                <div class="input-group">
                    <input type="text" id="navSearch" class="form-control form-control-sm"
                           placeholder="Search fruits…">
                    <button class="btn btn-light btn-sm" onclick="applyNavSearch()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>
            <a href="admin/login.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-shield-lock me-1"></i>Admin Login
            </a>
        </div>
    </div>
</nav>

<!-- ===== Hero ===== -->
<section class="hero-section text-center">
    <div class="container">
        <h1><i class="bi bi-apple me-2"></i>Fresh Fruits, Delivered Daily</h1>
        <p class="mb-4">Hand-picked seasonal produce delivered straight to your door.</p>
        <div class="d-flex justify-content-center">
            <div class="input-group" style="max-width:460px">
                <input type="text" id="heroSearch" class="form-control form-control-lg"
                       placeholder="Search for a fruit…">
                <button class="btn btn-warning fw-bold" onclick="applyHeroSearch()">
                    <i class="bi bi-search me-1"></i>Search
                </button>
            </div>
        </div>
    </div>
</section>

<!-- ===== Category Filter Pills ===== -->
<div class="bg-white border-bottom py-3">
    <div class="container d-flex flex-wrap gap-2 align-items-center" id="categoryPills">
        <span class="text-muted small fw-semibold me-1">Filter:</span>
        <!-- Pills are injected by JS -->
    </div>
</div>

<!-- ===== Fruit Grid ===== -->
<main class="container py-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="section-heading" id="sectionTitle">Our Fresh Fruits</h2>
        <span class="text-muted small" id="itemCount"></span>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4" id="fruitsGrid">
        <!-- Cards injected by JavaScript -->
    </div>

    <div id="noResults" class="text-center py-5 d-none">
        <i class="bi bi-search" style="font-size:3rem;color:#ccc"></i>
        <p class="mt-3 text-muted">No fruits found. <a href="#" onclick="resetFilters()">Clear filters</a></p>
    </div>
</main>

<!-- ===== Footer ===== -->
<footer class="py-4 mt-4">
    <div class="container text-center">
        <p class="mb-1">
            <i class="bi bi-basket2-fill me-1"></i>
            <strong class="text-white">FreshFruits</strong> &nbsp;&mdash;&nbsp; Fresh produce, every day.
        </p>
        <p class="small mb-0">&copy; 2025 FreshFruits. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// =====================================================

    {

    },
    {
        id: 3,
        name: 'Strawberry',

    },
    {

        name: 'Mango',
        category: 'Tropical',
        description: 'Exotic Alphonso mangoes with a rich, sweet aroma. King of fruits.',
        actual_price: 3.99,
        discount: 15,
        in_stock: true,
        image: 'https://images.unsplash.com/photo-1553279768-865429fa0078?w=400&h=300&fit=crop'
    },
    {

        image: 'https://images.unsplash.com/photo-1537640538966-79f369143f8f?w=400&h=300&fit=crop'
    },
    {
        id: 6,
        name: 'Orange',
        category: 'Citrus',
        description: 'Juicy navel oranges loaded with vitamin C, perfect for fresh juice.',
        actual_price: 1.99,

    },
    {
        id: 7,
        name: 'Watermelon',

        description: 'Giant sweet watermelons — 92% water and full of lycopene.',
        actual_price: 5.99,

    },
    {
        id: 8,
        name: 'Blueberries',
        category: 'Berries',
        description: 'Premium wild blueberries packed with antioxidants and vitamins.',
        actual_price: 5.49,
        discount: 0,
        in_stock: false,
        image: 'https://images.unsplash.com/photo-1498557850523-fd3d118b962e?w=400&h=300&fit=crop'
    },
    {
        id: 9,
        name: 'Pineapple',
        category: 'Tropical',
        description: 'Golden pineapples — sweet, tangy, and rich in bromelain.',
        actual_price: 3.29,

    },
    {
        id: 10,
        name: 'Kiwi',
        category: 'Exotic',
        description: 'Bright green kiwi with a sweet-tart flavor, more vitamin C than an orange.',
        actual_price: 2.49,

        image: 'https://images.unsplash.com/photo-1618897996318-5a901fa6ca71?w=400&h=300&fit=crop'
    },
    {
        id: 11,
        name: 'Peach',
        category: 'Stone Fruits',
        description: 'Velvety sun-ripened peaches with fragrant golden flesh.',
        actual_price: 3.79,
        discount: 12,
        in_stock: true,
        image: 'https://images.unsplash.com/photo-1595743825637-cdafc8ad4173?w=400&h=300&fit=crop'
    },
    {
        id: 12,
        name: 'Lemon',
        category: 'Citrus',
        description: 'Bright zesty lemons — an indispensable kitchen and baking staple.',
        actual_price: 1.29,
        discount: 0,
        in_stock: true,
        image: 'https://images.unsplash.com/photo-1590502593747-42a996133562?w=400&h=300&fit=crop'
    }
];

// =====================================================
// State
// =====================================================
let currentSearch   = '';
let currentCategory = '';

// =====================================================
// Helpers
// =====================================================
function formatPrice(p) {
    return '$' + p.toFixed(2);
}
function discountedPrice(price, disc) {
    return Math.round((price - price * disc / 100) * 100) / 100;
}

// =====================================================
// Build category pills
// =====================================================
function buildCategoryPills() {
    const cats   = [...new Set(fruits.map(f => f.category))].sort();
    const container = document.getElementById('categoryPills');
    container.innerHTML = '<span class="text-muted small fw-semibold me-1">Filter:</span>';

    const allBtn = document.createElement('a');
    allBtn.href = '#';
    allBtn.className = 'btn btn-sm btn-success';
    allBtn.id = 'pill-all';
    allBtn.textContent = 'All';
    allBtn.onclick = e => { e.preventDefault(); filterByCategory(''); };
    container.appendChild(allBtn);

    cats.forEach(cat => {
        const btn = document.createElement('a');
        btn.href = '#';
        btn.className = 'btn btn-sm btn-outline-success';
        btn.id = 'pill-' + cat;
        btn.textContent = cat;
        btn.onclick = e => { e.preventDefault(); filterByCategory(cat); };
        container.appendChild(btn);
    });
}

function updatePillActive() {
    document.querySelectorAll('#categoryPills a.btn').forEach(btn => {
        btn.className = btn.id === 'pill-all'
            ? (currentCategory === '' ? 'btn btn-sm btn-success' : 'btn btn-sm btn-outline-success')
            : (btn.id === 'pill-' + currentCategory ? 'btn btn-sm btn-success' : 'btn btn-sm btn-outline-success');
    });
}

// =====================================================
// Render grid
// =====================================================
function renderFruits() {
    let list = fruits;

    if (currentSearch.trim() !== '') {
        const q = currentSearch.toLowerCase();
        list = list.filter(f =>
            f.name.toLowerCase().includes(q) ||
            f.category.toLowerCase().includes(q) ||
            f.description.toLowerCase().includes(q)
        );
    }
    if (currentCategory !== '') {
        list = list.filter(f => f.category === currentCategory);
    }

    const grid     = document.getElementById('fruitsGrid');
    const noRes    = document.getElementById('noResults');
    const title    = document.getElementById('sectionTitle');
    const countEl  = document.getElementById('itemCount');

    grid.innerHTML = '';
    countEl.textContent = list.length + ' item' + (list.length !== 1 ? 's' : '');

    if (currentSearch !== '') {
        title.textContent = 'Results for "' + currentSearch + '"';
    } else if (currentCategory !== '') {
        title.textContent = currentCategory;
    } else {
        title.textContent = 'Our Fresh Fruits';
    }

    if (list.length === 0) {
        noRes.classList.remove('d-none');
        return;
    }
    noRes.classList.add('d-none');

    list.forEach(fruit => {
        const finalPrice  = discountedPrice(fruit.actual_price, fruit.discount);
        const hasDiscount = fruit.discount > 0;
        const placeholder = 'https://placehold.co/400x300/e8f5e9/2e7d32?text=' + encodeURIComponent(fruit.name);

        const col = document.createElement('div');
        col.className = 'col';
        col.innerHTML = `
            <div class="fruit-card card h-100" onclick="window.location='fruit-detail.html?id=${fruit.id}'">

                <div class="card-img-wrapper">
                    <img src="${fruit.image}"
                         class="card-img-top"
                         alt="${fruit.name}"
                         onerror="this.src='${placeholder}'">

                    ${hasDiscount ? `<div class="discount-badge">${fruit.discount}% OFF</div>` : ''}

                    ${!fruit.in_stock ? `
                        <div class="out-of-stock-overlay">
                            <span>Out of Stock</span>
                        </div>` : ''}
                </div>

                <div class="card-body d-flex flex-column">
                    <div class="mb-1">
                        <span class="category-pill">${fruit.category}</span>
                    </div>
                    <h5 class="card-title mt-1">${fruit.name}</h5>

                    <div class="mt-auto">
                        ${hasDiscount
                            ? `<div class="price-actual">${formatPrice(fruit.actual_price)}</div>
                               <div class="price-discounted">${formatPrice(finalPrice)}</div>`
                            : `<div class="price-no-discount">${formatPrice(fruit.actual_price)}</div>`
                        }
                    </div>
                </div>

                <div class="card-footer bg-transparent border-0 pb-3 px-3">
                    <button class="btn btn-success w-100 btn-sm"
                            onclick="event.stopPropagation(); window.location='fruit-detail.html?id=${fruit.id}'">
                        <i class="bi bi-eye me-1"></i>View Details
                    </button>
                </div>
            </div>
        `;
        grid.appendChild(col);
    });

    updatePillActive();
}

// =====================================================
// Filter actions
// =====================================================
function filterByCategory(cat) {
    currentCategory = cat;
    currentSearch   = '';
    document.getElementById('navSearch').value  = '';
    document.getElementById('heroSearch').value = '';
    renderFruits();
}

function applyNavSearch() {
    currentSearch   = document.getElementById('navSearch').value;
    currentCategory = '';
    renderFruits();
}

function applyHeroSearch() {
    currentSearch   = document.getElementById('heroSearch').value;
    currentCategory = '';
    renderFruits();
}

function resetFilters() {
    currentSearch   = '';
    currentCategory = '';
    document.getElementById('navSearch').value  = '';
    document.getElementById('heroSearch').value = '';
    renderFruits();
    return false;
}

// Enter key on search inputs
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('navSearch').addEventListener('keydown',  e => { if (e.key === 'Enter') applyNavSearch(); });
    document.getElementById('heroSearch').addEventListener('keydown', e => { if (e.key === 'Enter') applyHeroSearch(); });

    buildCategoryPills();
    renderFruits();
});
</script>
</body>
</html>
